<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management - 404 Not Found</title>
    <!-- Include Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- Iconify Icon Component -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fredoka', 'sans-serif'],
                    },
                    boxShadow: {
                        'custom': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    },
                }
            }
        }
    </script>
    <style>
        .bg-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #4f46e5 100%);
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800 min-h-screen flex items-center justify-center">
    <!-- Main content -->
    <main class="container mx-auto px-4">
        <div class="flex-grow flex items-center justify-center">
            <div class="bg-gray-900 bg-opacity-65 rounded-2xl border border-gray-700/50 backdrop-blur-md overflow-hidden max-w-2xl mx-auto animate-fade-in p-8 text-center shadow-[0_8px_32px_0_rgba(0,0,0,0.37)]">
                <div>
                    <div class="w-32 h-32 bg-gradient rounded-full mx-auto flex items-center justify-center mb-6 shadow-lg shadow-blue-500/20">
                        <iconify-icon icon="solar:danger-triangle-bold-duotone" class="text-6xl text-white"></iconify-icon>
                    </div>
                    <h1 class="text-5xl font-bold text-white mb-4">404</h1>
                    <h2 class="text-2xl font-semibold text-white mb-4">Page Not Found</h2>
                    <p class="text-gray-300 mb-8">The page you are looking for doesn't exist or has been moved.</p>
                    <a href="dashboard.html" class="inline-flex items-center px-6 py-3 bg-gradient text-white rounded-xl hover:opacity-95 focus:outline-none focus:ring-4 focus:ring-blue-500/20 transition-all duration-200 font-medium shadow-lg shadow-blue-500/20 transform hover:-translate-y-0.5">
                        <iconify-icon icon="solar:home-2-bold-duotone" class="mr-2 text-xl"></iconify-icon> Back to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
