<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Management - Register</title>
    <!-- Include Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <!-- Iconify Icon Component -->
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fredoka', 'sans-serif'],
                    },
                    boxShadow: {
                        'custom': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    },
                }
            }
        }
    </script>
    <style>
        .bg-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #4f46e5 100%);
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-950 via-gray-900 to-gray-800 min-h-screen flex items-center justify-center p-4">
    <div class="animate-fade-in bg-gray-900 bg-opacity-65 p-8 rounded-2xl border border-gray-700/50 backdrop-blur-md w-full max-w-md shadow-[0_8px_32px_0_rgba(0,0,0,0.37)]">
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-gradient rounded-full mb-4 items-center justify-center shadow-lg shadow-blue-500/20">
                <iconify-icon icon="solar:user-plus-bold-duotone" class="text-3xl text-white"></iconify-icon>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-wide">Contact Management</h1>
            <p class="text-gray-300 mt-2">Create a new account</p>
        </div>

        <form>
            <div class="mb-4">
                <label for="username" class="block text-gray-300 text-sm font-medium mb-2">Username</label>
                <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:user-bold-duotone" class="text-gray-400 text-xl"></iconify-icon>
                    </div>
                    <input type="text" id="username" name="username" 
                        class="w-full pl-10 pr-3 py-3 bg-gray-800 bg-opacity-40 border border-gray-700 text-white rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-400 transition-all duration-200" 
                        placeholder="Choose a username" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="name" class="block text-gray-300 text-sm font-medium mb-2">Full Name</label>
                <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:user-id-bold-duotone" class="text-gray-400 text-xl"></iconify-icon>
                    </div>
                    <input type="text" id="name" name="name" 
                        class="w-full pl-10 pr-3 py-3 bg-gray-800 bg-opacity-40 border border-gray-700 text-white rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-400 transition-all duration-200" 
                        placeholder="Enter your full name" required>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="block text-gray-300 text-sm font-medium mb-2">Password</label>
                <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:lock-password-bold-duotone" class="text-gray-400 text-xl"></iconify-icon>
                    </div>
                    <input type="password" id="password" name="password" 
                        class="w-full pl-10 pr-3 py-3 bg-gray-800 bg-opacity-40 border border-gray-700 text-white rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-400 transition-all duration-200" 
                        placeholder="Create a password" required>
                </div>
            </div>

            <div class="mb-6">
                <label for="confirm_password" class="block text-gray-300 text-sm font-medium mb-2">Confirm Password</label>
                <div class="relative flex items-center">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <iconify-icon icon="solar:check-square-bold-duotone" class="text-gray-400 text-xl"></iconify-icon>
                    </div>
                    <input type="password" id="confirm_password" name="confirm_password" 
                        class="w-full pl-10 pr-3 py-3 bg-gray-800 bg-opacity-40 border border-gray-700 text-white rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-400 transition-all duration-200" 
                        placeholder="Confirm your password" required>
                </div>
            </div>

            <div class="mb-6">
                <button type="submit" 
                    class="w-full bg-gradient text-white py-3 px-4 rounded-xl hover:opacity-95 focus:outline-none focus:ring-4 focus:ring-blue-500/20 transition-all duration-200 font-medium shadow-lg shadow-blue-500/20 transform hover:-translate-y-0.5 flex items-center justify-center">
                    <iconify-icon icon="solar:user-plus-bold-duotone" class="mr-2 text-xl"></iconify-icon> Register
                </button>
            </div>

            <div class="text-center text-sm text-gray-400">
                Already have an account? 
                <a href="index.html" class="text-blue-400 hover:text-blue-300 font-medium transition-colors duration-200">Sign in</a>
            </div>
        </form>
    </div>
</body>
</html>
