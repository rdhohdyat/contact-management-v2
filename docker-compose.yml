services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www

  nginx:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: contact_management
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  node:
    image: node:20
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "5173:5173"

volumes:
  mysql_data: